<div class="login-container">
  <div class="login-box">
    <div class="login-header">
      <span class="material-icons">lock</span>
      <h1>Acesso à Loja</h1>
    </div>

    <!-- DEBUG: Mostrar status de carregamento -->
    <div style="background: #f0f0f0; padding: 10px; border-radius: 4px; margin-bottom: 20px; font-size: 12px; color: #666;">
      <p>🔄 Loading: {{ (loading$ | async) }}</p>
      <p>❌ Error: {{ (error$ | async) || 'Nenhum erro' }}</p>
    </div>

    <form (ngSubmit)="fazerLogin()" class="login-form">
      <div class="form-group">
        <label for="email">Email</label>
        <input 
          type="email" 
          id="email" 
          name="email"
          [(ngModel)]="email"
          placeholder="seu@email.com"
          [disabled]="(loading$ | async) === true"
          (focus)="error$.next('')"
        />
      </div>

      <div class="form-group">
        <label for="senha">Senha</label>
        <div class="password-wrapper">
          <input 
            [type]="senhaVisivel ? 'text' : 'password'"
            id="senha"
            name="senha"
            [(ngModel)]="senha"
            placeholder="Digite sua senha"
            [disabled]="(loading$ | async) === true"
            (keyup.enter)="fazerLogin()"
            (focus)="error$.next('')"
          />
          <button 
            type="button" 
            class="btn-toggle-senha"
            (click)="alternarVisibilidadeSenha()"
            [disabled]="(loading$ | async) === true"
            title="Mostrar/Ocultar senha"
          >
            <span class="material-icons">
              {{ senhaVisivel ? 'visibility_off' : 'visibility' }}
            </span>
          </button>
        </div>
      </div>

      <div class="erro" *ngIf="error$ | async as erro">
        <span class="material-icons">error</span>
        <span>{{ erro }}</span>
      </div>

      <button 
        type="submit" 
        class="btn-login"
        [disabled]="(loading$ | async) === true"
      >
        <span class="material-icons" *ngIf="loading$ | async">sync</span>
        <span>{{ (loading$ | async) ? 'Carregando...' : 'Acessar' }}</span>
      </button>
    </form>

    <div class="login-info">
      <p><strong>Firebase Authentication</strong></p>
      <p>Use seu email e senha registrados</p>
    </div>
  </div>
</div>
