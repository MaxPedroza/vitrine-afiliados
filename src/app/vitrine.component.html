<div class="vitrine-container">
  <div class="header-vitrine">
    <div class="header-title">
      <span class="material-icons">storefront</span>
      <h1 class="title-purple">Vitrine</h1>
    </div>
    <a routerLink="/login" class="btn-admin-login" title="Acessar painel administrativo">
      <span class="material-icons">admin_panel_settings</span>
      <span>Área Admin</span>
    </a>
  </div>

  <div class="products-grid" *ngIf="(produtos$ | async)?.length! > 0">
    <div class="product-card" *ngFor="let p of produtos$ | async">
      <div class="image-wrapper">
        <img [src]="p.link_imagem || 'assets/placeholder.png'" [alt]="p.nome">
        <div class="badge-hot" *ngIf="(p.cliques || 0) > 10">🔥</div>
      </div>

      <div class="card-content">
        <h3 class="product-name">{{ p.nome }}</h3>
        <p class="meta-info">{{ p.loja | titlecase }}</p>
        
        <button class="btn-buy" (click)="irParaOferta(p)">
          <span class="material-icons">shopping_cart</span>
          Ver na {{ p.loja | titlecase }}
        </button>
      </div>
    </div>
  </div>

  <div class="empty-state" *ngIf="(produtos$ | async)?.length! === 0">
    <span class="material-icons">inbox</span>
    <p>Nenhum produto disponível no momento</p>
  </div>
</div>
