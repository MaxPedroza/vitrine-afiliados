<div class="admin-container">
  <div class="header-admin">
    <div class="header-title">
      <span class="material-icons">inventory_2</span>
      <h1 class="title-purple">{{ editandoId ? 'Editar Produto' : 'Novo Produto' }}</h1>
    </div>
    <div class="header-right">
      <div class="editing-indicator" *ngIf="editandoId">
        <span class="material-icons">edit</span>
        <span>Em modo edição</span>
      </div>
      <button class="btn-clear-all" (click)="limparTudo()" *ngIf="produtos.length > 0">
        <span class="material-icons">delete_sweep</span> Limpar Tudo
      </button>
    </div>
  </div>
  
  <form (ngSubmit)="adicionar()" class="cadastro-form">
    <input [(ngModel)]="novoProduto.nome" name="nome" placeholder="Nome do Produto" required>
    <input [(ngModel)]="novoProduto.link_compra" name="link" placeholder="Link de Afiliado">
    <input [(ngModel)]="novoProduto.link_imagem" name="img" placeholder="URL da Imagem">
    <div class="row">
      <select [(ngModel)]="novoProduto.loja" name="loja">
        <option value="" disabled selected>Selecione a Loja</option>
        <option *ngFor="let loja of lojas$ | async" [value]="loja.nome">{{ loja.nome }}</option>
      </select>
      <input type="date" [(ngModel)]="novoProduto.data_expiracao" name="exp">
    </div>
    <div class="form-actions">
      <button type="submit" class="btn-add">
        <span class="material-icons">{{ editandoId ? 'save' : 'add_circle' }}</span>
        {{ editandoId ? 'Salvar Alterações' : 'Cadastrar Produto' }}
      </button>
      <button type="button" class="btn-cancel" (click)="cancelarEdicao()" *ngIf="editandoId">
        <span class="material-icons">close</span>
        Cancelar
      </button>
    </div>
  </form>

  <div *ngIf="produtos.length === 0" class="empty-state">
    Nenhum produto cadastrado ou carregando...
  </div>

  <div cdkDropList (cdkDropListDropped)="drop($event)" class="drag-list">
    <div *ngFor="let item of produtos" cdkDrag class="drag-item product-card-admin" [ngClass]="[(item.loja || '').toLowerCase(), getValidadeClass(item.data_expiracao)]" [class.editando]="editandoId === item.id">
      
      <div class="drag-handle" cdkDragHandle title="Arraste para reordenar">
        <span class="material-icons">drag_indicator</span>
      </div>
      
      <div class="prod-thumb">
        <img *ngIf="item.link_imagem" [src]="item.link_imagem" alt="thumb">
        <span *ngIf="!item.link_imagem" class="material-icons placeholder-icon">image</span>
      </div>

      <div class="prod-details product-info">
        <span class="nome">{{item.nome}}</span>
        <div class="meta">
          <div class="meta-group" *ngIf="item.data_expiracao" [ngClass]="getValidadeClass(item.data_expiracao)">
            <span class="material-icons">calendar_today</span>
            <span class="meta-text">{{item.data_expiracao | date:'dd/MM/yyyy'}}</span>
          </div>
          
          <div class="meta-group hot" *ngIf="item.cliques > 0">
            <span class="material-icons">whatshot</span>
            <span class="meta-text">{{item.cliques}} cliques</span>
          </div>
        </div>
      </div>

      <div class="actions product-actions">
        <button type="button" class="btn-icon purple" (click)="editar(item)" title="Editar">
          <span class="material-icons">edit</span>
        </button>
        <button type="button" class="btn-icon red" (click)="remover(item.id)" title="Excluir">
          <span class="material-icons">delete</span>
        </button>
      </div>
    </div>
  </div>
</div>
